<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CARTAS_LOGIN.EXE</title>

<style>

/* RESET */

* {
    box-sizing: border-box;
}

/* BODY */

body {
    margin: 0;

    height: 100vh;

    display: flex;

    justify-content: center;
    align-items: center;

    background-image: url("./imgs/10.png");

    background-size: cover;
    background-position: center;

    font-family: 'Courier New', monospace;
}

/* LOGIN WINDOW */

.login-window {
    width: 420px;

    background: #c0c0c0;

    border: 3px solid black;

    box-shadow:
        inset -2px -2px #808080,
        inset 2px 2px #ffffff;
}

/* HEADER */

.login-header {
    background: linear-gradient(to right, #000080, #1084d0);

    color: white;

    padding: 6px 10px;

    display: flex;

    justify-content: space-between;
    align-items: center;

    font-size: 13px;

    font-weight: bold;
}

/* WINDOW BUTTONS */

.window-buttons {
    display: flex;

    gap: 4px;
}

.window-btn {
    width: 16px;
    height: 16px;

    background: #c0c0c0;

    border: 2px outset white;

    display: flex;

    align-items: center;
    justify-content: center;

    color: black;

    font-size: 10px;

    font-family: Arial;
}

.window-btn.close {
    color: darkred;
}

/* CONTENT */

.login-content {
    padding: 25px;

    text-align: center;
}

/* LOGO */

.login-logo {
    width: 220px;

    max-width: 100%;

    margin-bottom: 10px;

    image-rendering: pixelated;
}

/* SUBTEXT */

.login-subtitle {
    margin-bottom: 25px;

    font-size: 13px;

    color: #333;
}

/* INPUTS */

.login-input {
    width: 100%;

    margin-bottom: 15px;

    padding: 10px;

    border: 2px inset #808080;

    background: white;

    font-family: 'Courier New', monospace;

    font-size: 14px;
}

/* BUTTON */

.login-button {
    width: 100%;

    padding: 10px;

    background: #c0c0c0;

    border: 2px outset white;

    cursor: pointer;

    font-family: 'Courier New', monospace;

    font-weight: bold;
}

.login-button:active {
    border: 2px inset white;
}

/* ERROR */

.error-message {
    margin-top: 15px;

    color: red;

    font-size: 13px;

    display: none;
}

/* BLINK */

.blink {
    animation: blink 1s steps(1) infinite;
}

@keyframes blink {

    50% {
        opacity: 0;
    }

}

</style>

</head>

<body>

<div class="login-window">

    <!-- HEADER -->

    <div class="login-header">

        <span>CARTAS_LOGIN.EXE</span>

        <div class="window-buttons">

            <div class="window-btn">_</div>

            <div class="window-btn">□</div>

            <div class="window-btn close">X</div>

        </div>

    </div>

    <!-- CONTENT -->

    <div class="login-content">

        <img
            class="login-logo"
            src="./imgs/janela 09.png"
            alt="Jambu">

        <p class="login-subtitle">

            PÁGINA SECRETA<br>

            Digite a senha para entrar

        </p>

        <input
            type="text"
            id="username"
            class="login-input"
            placeholder="nome de usuário">

        <input
            type="password"
            id="password"
            class="login-input"
            placeholder="senha">

        <button
            class="login-button"
            onclick="login()">

            ENTRAR

        </button>

        <div
            class="error-message blink"
            id="errorMessage">

            acesso negado

        </div>

    </div>

</div>

<script>

function login() {

    const errorBox =
        document.getElementById('errorMessage');

    // esconde erro ao tentar de novo
    errorBox.style.display = 'none';

    const username =
        document.getElementById('username').value;

    const password =
        document.getElementById('password').value;

    const correctUsername = "jambu";
    const correctPassword = "cartas";

    // simula "processando sistema"
    const button =
        document.querySelector('.login-button');

    button.innerText = "VERIFICANDO...";
    button.disabled = true;

    setTimeout(() => {

        if (username === correctUsername && password === correctPassword) {

            button.innerText = "ACESSO LIBERADO";

            sessionStorage.setItem("accessGranted", "true");

            setTimeout(() => {
                window.location.href = "ep.html";
            }, 600);

        } else {

            button.innerText = "ENTRAR";
            button.disabled = false;

            errorBox.style.display = 'block';

        }

    }, 800);

}

/* ENTER PRA LOGIN */

document.addEventListener('keydown', function(event) {

    if(event.key === 'Enter') {

        login();

    }

});

</script>

</body>

</html>
