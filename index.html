<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jambu Retrô</title>

<style>
.logo {
    width: 400px;
    image-rendering: pixelated;
}
body {
    margin: 0;
    padding: 20px;

    background-image: url("./imgs/06.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    font-family: 'Courier New', monospace;
    color: white;
}

/* CONTAINER PRINCIPAL */

#container {
    width: 1100px;
    margin: auto;

    background: #c0c0c0;
    border: 5px outset white;

    padding: 20px;
    color: black;
}

/* HEADER */

header {
    text-align: center;
    margin-bottom: 20px;
}

header h1 {
    color: red;
    text-shadow: 2px 2px black;
}

/* LAYOUT */

#layout {
    display: flex;
    gap: 20px;
}

/* MENU LATERAL */

#sidebar {
    width: 220px;

    background: white;
    border: 3px inset black;

    padding: 15px;
}

#sidebar h2 {
    margin-top: 0;
}

.social-link {
    display: block;
    margin-bottom: 10px;
    color: blue;
    font-weight: bold;
}

/* CONTEÚDO */

#content {
    flex: 1;
}

/* SEÇÕES */

.section {
    background: white;
    border: 3px inset black;

    padding: 15px;
    margin-bottom: 20px;
}

.section h2 {
    margin-top: 0;
    color: darkred;
}

/* SPOTIFY */

.spotify iframe {
    width: 100%;
    height: 352px;
    border: none;
}

/* YOUTUBE */

.youtube iframe {
    width: 100%;
    height: 400px;
}

/* MERCH */

.merch-grid {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.merch-item {
    width: 180px;
    text-align: center;
}

.merch-item img {
    width: 100%;
    border: 2px solid black;
}

/* BOTÃO */

.ticket-button {
    display: inline-block;

    background: red;
    color: white;

    padding: 12px 20px;

    text-decoration: none;
    font-weight: bold;

    border: 3px outset white;
}

</style>
</head>

<body>

<div id="container">

    <header>
        <img class="logo" src="./imgs/Lettering jambu (1).png" alt="Jambu">

        <p>
            otimizado para internet explorer 4.0
        </p>
    </header>

    <div id="layout">

        <!-- MENU LATERAL -->

        <aside id="sidebar">

            <h2>Redes</h2>

            <a class="social-link" href="https://www.instagram.com/oficialjambu/" target="_blank">
                Instagram
            </a>

            <a class="social-link" href="#"target="_blank">
                Spotify
            </a>

            <a class="social-link" href="https://www.youtube.com/channel/UCouGneqV9PM4AgMaC2odRZQ"target="_blank">
                YouTube
            </a>

            <a class="social-link" href="https://www.tiktok.com/@oficialjambu"target="_blank">
                TikTok
            </a>

        </aside>

        <!-- CONTEÚDO -->

        <main id="content">

            <!-- SPOTIFY -->

            <section class="section spotify">

                <h2>Spotify</h2>

                <iframe
                    style="border-radius:12px"
                    src="https://open.spotify.com/embed/track/0eYhsqk8WYzwjI5EEiKHL8"
                    width="100%"
                    height="352"
                    frameborder="0"
                    allowfullscreen=""
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy">
                </iframe>
            </section>

            <!-- YOUTUBE -->

            <section class="section youtube">

                <h2>Último Vídeo</h2>

                <iframe
                    width="100%"
                    height="400"
                    src="https://www.youtube.com/embed/OD99f19gSyk"
                    title="YouTube video player"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </section>

            <!-- MERCH -->

            <section class="section">

                <h2>Merch</h2>

                <div class="merch-grid">

                    <div class="merch-item">

                        <a href="https://heartmerch.com.br/products/jambu-camiseta-branca-fdc?srsltid=AfmBOopeKu5LIB_qvEHJdacewkdJobvK3e1UlRMXy3zDcoC2Sfir8I6_" target="_blank">

                            <img src="./imgs/JAMBUFDCOFW01.webp">

                            <p>Camiseta Tour</p>

                        </a>

                    </div>

                    <div class="merch-item">

                        <a href="#">

                            <img src="./imgs/poster.png">

                            <p>Poster Oficial</p>

                        </a>

                    </div>

                </div>

            </section>

            <!-- INGRESSOS -->

            <section class="section">

                <h2>Ingressos</h2>

                <a class="ticket-button" href="#">
                    COMPRAR INGRESSOS
                </a>

            </section>

        </main>

    </div>

</div>

</body>
</html>
